<!DOCTYPE html>
<!--
  Template: slideless scrollytelling (vazio)
  Como usar:
    1. Substituir o marker /* SLIDELESS:THEME */
    2. Popular .scene com texto narrativo (cada uma com data-reveal)
    3. Para sticky chart: usar .story com .story__text + .story__chart e
       data-step nas scenes. Ver references/modelos/scrollytelling.md
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TÍTULO — Narrativa</title>

  <script>
    (function() {
      try {
        var t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- SLIDELESS:TYPE-KIT — colar aqui o <link> do kit tipográfico escolhido em
       references/type-kits.md (decisão do parti — references/direcao-de-arte.md).
       PROIBIDO entregar com este slot vazio ou com Inter como fonte display. -->
  <!-- SLIDELESS:TYPE-KIT-END -->

  <style>
    /* SLIDELESS:THEME */

    /* ─── Motion de reveal (perfil do parti, colado como bloco aditivo) ──
       v5: o tema não define mais [data-reveal]{opacity:0} — sem este bloco o
       data-reveal/IO abaixo não anima. Receita = css-patterns §13.3:
       BASE = estado final visível; scroll-driven nativo onde houver suporte;
       IO (.is-visible) só onde NÃO há scroll-driven; reduced-motion = visível.
       Para a cena sticky (W1 — pin + estados data-bound), o IO de data-step
       continua dirigindo a mutação do gráfico (ver ambicao.md W1). */
    [data-reveal] { opacity: 1; }   /* estado final = base */
    @supports (animation-timeline: view()) {
      @media (prefers-reduced-motion: no-preference) {
        [data-reveal] {
          animation: reveal-up linear both;
          animation-timeline: view();
          animation-range: entry 0% cover 35%;
        }
        @keyframes reveal-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
      }
    }
    @supports not (animation-timeline: view()) {
      @media (prefers-reduced-motion: no-preference) {
        [data-reveal] {
          opacity: 0; transform: translateY(20px);
          transition: opacity var(--duration-fade, 700ms) var(--ease-out),
                      transform var(--duration-fade, 700ms) var(--ease-out);
        }
        [data-reveal].is-visible { opacity: 1; transform: none; }
      }
    }

    .progress { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 100; }
    .progress__bar { height: 100%; background: var(--color-accent); width: 0%; transition: width 100ms linear; }

    .topbar { position: sticky; top: 2px; z-index: 90; height: var(--header-h); background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; padding: 0 var(--space-5); gap: var(--space-5); }
    [data-theme="dark"] .topbar { background: rgba(20,17,13,0.85); }
    .topbar__brand { font-weight: 600; font-size: 0.9375rem; text-decoration: none; color: var(--color-fg); }
    .topbar__spacer { flex: 1; }

    .scrolly { max-width: 1100px; margin: 0 auto; padding: var(--space-12) var(--space-6); }
    .scrolly .lead { font-size: 1.3125rem; line-height: 1.5; max-width: 60ch; }

    .scene { margin: var(--space-12) 0; }

    .story { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-10); align-items: start; }
    .story__chart { position: sticky; top: 15vh; height: 70vh; }

    @media (max-width: 900px) {
      .story { display: block; }
      .story__chart { position: static; height: 360px; margin: var(--space-7) 0; }
    }

    @media print {
      .progress, .topbar { display: none; }
      .story { display: block; }
      .story__chart { position: static; height: auto; }
      .scene { break-inside: avoid; margin-bottom: var(--space-7); }
    }
  </style>
</head>
<body>
  <div class="progress" aria-hidden="true"><div class="progress__bar" id="progress-bar"></div></div>

  <header class="topbar">
    <a href="#" class="topbar__brand">BRAND · Narrativa</a>
    <span class="topbar__spacer"></span>
    <button class="theme-toggle" type="button" aria-label="Alternar tema"><span aria-hidden="true">◐</span></button>
  </header>

  <main class="scrolly">
    <section class="scene" data-reveal>
      <p class="content__meta">RELATÓRIO · AAAA</p>
      <h1>TÍTULO DA NARRATIVA</h1>
      <p class="lead">Subtítulo editorial em uma a duas frases situando o leitor.</p>
    </section>

    <section class="scene" data-reveal>
      <h2>Cena 1</h2>
      <p>Conteúdo da cena. Reveal acontece quando entra no viewport.</p>
    </section>

    <section class="scene" data-reveal>
      <h2>Cena 2</h2>
      <p>Conteúdo da cena.</p>
    </section>

    <section class="scene" data-reveal>
      <h2>Cena 3</h2>
      <p>Conteúdo da cena.</p>
    </section>
  </main>

  <script>
    document.querySelector('.theme-toggle')?.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch {}
    });

    function updateProgress() {
      const h = document.documentElement;
      const pct = (h.scrollTop / Math.max(1, h.scrollHeight - h.clientHeight)) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';
    }
    addEventListener('scroll', updateProgress, { passive: true });
    updateProgress();

    const rio = new IntersectionObserver(es => {
      es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); rio.unobserve(e.target); } });
    }, { threshold: 0.2, rootMargin: '0px 0px -60px 0px' });
    document.querySelectorAll('[data-reveal]').forEach(el => rio.observe(el));
  </script>
</body>
</html>
