<!DOCTYPE html>
<!--
  Template: slideless deck (vazio)
  Como usar:
    1. Substituir o marker /*
 * slideless — tema itau (laranja oficial #FF6200 + Itaú Display/Text)
 *
 * Como usar: copiar este arquivo INTEIRO para dentro do <style> do HTML
 * single-file. Adicionar APENAS os componentes específicos do modelo
 * (handbook/hub/scrollytelling/site/deck) depois deste bloco.
 *
 * Boot script de tema é responsabilidade do <head> do HTML (ver
 * references/design-system.md).
 */

:root {
  /* Cores Itaú — fixas em ambos os temas (light + dark) */
  --itau-orange:     #FF6200;
  --itau-orange-2:   #F88104;
  --itau-orange-3:   #FA9F09;
  --itau-blue-3:     #3B85FA;
  --itau-yellow:     #FBC305;
  --itau-warm-black: #14110d;   /* preto quente da marca — usado em contrastes específicos */

  /* Light theme — neutros warm + accent laranja */
  --color-bg:            #ffffff;
  --color-bg-elevated:   #faf8f5;
  --color-bg-sunken:     #f4f1ec;
  --color-fg:            #1a1a1a;
  --color-fg-muted:      #525252;
  --color-fg-subtle:     #8a8a8a;
  --color-border:        #e8e4dd;
  --color-border-strong: #d4cec3;
  --color-accent:        var(--itau-orange);
  --color-accent-hover:  var(--itau-orange-2);
  --color-accent-fg:     #ffffff;

  /* Callouts */
  --color-info-bg:     rgba(5, 32, 183, 0.06);
  --color-info-border: var(--itau-blue-3);
  --color-tip-bg:      #f0fdf4;
  --color-tip-border:  #22c55e;
  --color-warn-bg:     rgba(251, 195, 5, 0.12);
  --color-warn-border: var(--itau-yellow);
  --color-danger-bg:     #fef2f2;
  --color-danger-border: #ef4444;

  /* Syntax highlight (componente .code) */
  --syntax-string:  #16a34a;
  --syntax-keyword: var(--itau-orange);
  --syntax-function:var(--itau-blue-3);

  /* Tipografia */
  --font-text:    'Itau Text', 'Inter', -apple-system, system-ui, sans-serif;
  --font-display: 'Itau Display', 'Inter', -apple-system, system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', 'SF Mono', Consolas, monospace;

  /* Escala editorial — handbook/hub/scrollytelling/site
     No modelo `deck` use clamp() em classes próprias (.title-xl etc.) */
  --size-h1:    2.5rem;
  --size-h2:    1.75rem;
  --size-h3:    1.25rem;
  --size-h4:    1.0625rem;
  --size-lead:  1.1875rem;
  --size-body:  1rem;
  --size-small: 0.9375rem;
  --size-xs:    0.8125rem;
  --size-code:  0.875rem;

  /* Espaço */
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.5rem; --space-6: 2rem;
  --space-7: 2.5rem;  --space-8: 3rem;   --space-10: 4rem;
  --space-12: 5rem;

  /* Layout */
  --content-max: 720px;
  --sidebar-w:   268px;
  --toc-w:       220px;
  --header-h:    56px;

  /* Raio, sombra, easing */
  --radius-sm: 4px;
  --radius:    8px;
  --radius-lg: 12px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 6px rgba(0,0,0,0.05), 0 10px 24px rgba(0,0,0,0.08);

  --ease:        cubic-bezier(0.22, 1, 0.36, 1);
  --ease-out:    cubic-bezier(0, 0, 0.2, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --duration-fast:  150ms;
  --duration:       250ms;
  --duration-slide: 600ms;
  --duration-fade:  700ms;
}

[data-theme="dark"] {
  --color-bg:            #14110d;   /* preto quente — identidade Itaú dark */
  --color-bg-elevated:   #1c1814;
  --color-bg-sunken:     #221d18;
  --color-fg:            #e8eaed;
  --color-fg-muted:      #a8a39a;
  --color-fg-subtle:     #6e6a62;
  --color-border:        #2f2a23;
  --color-border-strong: #403a32;
  --color-accent:        var(--itau-orange-3);   /* mais luminoso no dark */
  --color-accent-hover:  var(--itau-orange-2);
  --color-accent-fg:     #14110d;

  --color-info-bg:   rgba(59, 133, 250, 0.10);
  --color-tip-bg:    rgba(34, 197, 94, 0.10);
  --color-warn-bg:   rgba(251, 195, 5, 0.10);
  --color-danger-bg: rgba(239, 68, 68, 0.10);

  --syntax-string:  #4ade80;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow:    0 1px 3px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 6px rgba(0,0,0,0.4), 0 10px 24px rgba(0,0,0,0.5);
}

/* ─── Reset / base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-text);
  font-size: var(--size-body);
  line-height: 1.65;
  color: var(--color-fg);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  transition: background var(--duration-fast), color var(--duration-fast);
}

/* Foco visível (a11y) */
:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* Headings editoriais (não-deck) */
h1, h2, h3, h4 {
  font-family: var(--font-display);
  color: var(--color-fg);
  line-height: 1.25;
  letter-spacing: -0.015em;
}
h1 { font-size: var(--size-h1); font-weight: 700; margin: 0 0 var(--space-3); }
h2 {
  font-size: var(--size-h2); font-weight: 700;
  margin: var(--space-10) 0 var(--space-4);
  scroll-margin-top: calc(var(--header-h) + var(--space-4));
  position: relative;
}
h3 {
  font-size: var(--size-h3); font-weight: 600;
  margin: var(--space-7) 0 var(--space-3);
  scroll-margin-top: calc(var(--header-h) + var(--space-4));
}
h4 { font-size: var(--size-h4); font-weight: 600; margin: var(--space-5) 0 var(--space-2); }

p { margin: 0 0 var(--space-4); max-width: 65ch; color: var(--color-fg); }
.lead {
  font-size: var(--size-lead);
  line-height: 1.5;
  color: var(--color-fg-muted);
  margin-bottom: var(--space-7);
  font-weight: 400;
  max-width: 60ch;
}
a { color: var(--color-accent); text-decoration: none; }
a:hover { color: var(--color-accent-hover); text-decoration: underline; text-underline-offset: 3px; }
strong { font-weight: 600; }
code:not(pre code) {
  font-family: var(--font-mono); font-size: 0.875em;
  background: var(--color-bg-sunken);
  padding: 0.12em 0.4em;
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
}
ul, ol { padding-left: var(--space-5); margin: 0 0 var(--space-4); }
li { margin-bottom: var(--space-2); max-width: 65ch; }
li::marker { color: var(--color-fg-subtle); }

/* ─── Callouts ─────────────────────────────────────────────────────── */
.callout {
  display: flex; gap: var(--space-4);
  padding: var(--space-4) var(--space-5);
  margin: var(--space-5) 0;
  border-left: 3px solid;
  border-radius: var(--radius);
}
.callout--info   { background: var(--color-info-bg);   border-color: var(--color-info-border); }
.callout--tip    { background: var(--color-tip-bg);    border-color: var(--color-tip-border); }
.callout--warn   { background: var(--color-warn-bg);   border-color: var(--color-warn-border); }
.callout--danger { background: var(--color-danger-bg); border-color: var(--color-danger-border); }
.callout__icon {
  flex-shrink: 0; width: 22px; height: 22px;
  display: grid; place-items: center;
  border-radius: 50%; font-weight: 700;
  font-size: 0.75rem; color: white;
  margin-top: 2px;
}
.callout--info   .callout__icon { background: var(--color-info-border); }
.callout--tip    .callout__icon { background: var(--color-tip-border); }
.callout--warn   .callout__icon { background: var(--color-warn-border); color: var(--itau-warm-black); }
.callout--danger .callout__icon { background: var(--color-danger-border); }
.callout__content { flex: 1; min-width: 0; }
.callout__title { font-weight: 600; margin: 0 0 var(--space-1); font-size: var(--size-small); }
.callout__content p { margin: 0; font-size: var(--size-small); }

/* ─── Code block ───────────────────────────────────────────────────── */
.code {
  position: relative;
  background: var(--color-bg-sunken);
  border-radius: var(--radius);
  margin: var(--space-4) 0;
  border: 1px solid var(--color-border);
  overflow: hidden;
}
.code__head {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3) var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--color-border);
  background: var(--color-bg-elevated);
}
.code__lang  { font-family: var(--font-mono); font-size: var(--size-xs); color: var(--color-fg-subtle); }
.code__copy {
  padding: 4px 10px; font-size: var(--size-xs);
  background: var(--color-bg); border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); cursor: pointer;
  color: var(--color-fg-muted); font: inherit;
  transition: all var(--duration-fast);
}
.code__copy:hover { color: var(--color-fg); border-color: var(--color-border-strong); }
.code__copy.is-copied { color: var(--color-accent); border-color: var(--color-accent); }
.code pre { padding: var(--space-4); overflow-x: auto; margin: 0; }
.code code { font-family: var(--font-mono); font-size: var(--size-code); line-height: 1.65; color: var(--color-fg); }

/* Highlighting manual mínimo */
.tk-comment { color: var(--color-fg-subtle); font-style: italic; }
.tk-str { color: var(--syntax-string); }
.tk-kw  { color: var(--syntax-keyword); font-weight: 500; }
.tk-fn  { color: var(--syntax-function); }

/* ─── Toggle (<details>) ───────────────────────────────────────────── */
.toggle {
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  margin: var(--space-3) 0;
  overflow: hidden;
  background: var(--color-bg);
  transition: border-color var(--duration-fast);
}
.toggle:hover { border-color: var(--color-border-strong); }
.toggle[open] { background: var(--color-bg-elevated); }
.toggle__summary {
  padding: var(--space-3) var(--space-5);
  cursor: pointer;
  font-weight: 500;
  font-size: var(--size-small);
  list-style: none;
}
.toggle__summary::-webkit-details-marker { display: none; }
.toggle__summary::before {
  content: '▸';
  display: inline-block;
  margin-right: var(--space-3);
  color: var(--color-fg-subtle);
  transition: transform var(--duration-fast);
}
.toggle[open] .toggle__summary::before { transform: rotate(90deg); }
.toggle__body { padding: 0 var(--space-5) var(--space-4); }

/* ─── Theme toggle button ──────────────────────────────────────────── */
.theme-toggle {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--color-fg);
  font-size: 14px;
  transition: all var(--duration-fast);
}
.theme-toggle:hover { background: var(--color-bg-elevated); border-color: var(--color-border-strong); }

/* ─── Reveal on scroll ─────────────────────────────────────────────── */
[data-reveal] {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 600ms var(--ease-out), transform 600ms var(--ease-out);
}
[data-reveal].is-visible { opacity: 1; transform: none; }

/* ─── Tabs ─────────────────────────────────────────────────────────── */
.tabs { display: flex; gap: var(--space-1); border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-5); }
.tab {
  padding: var(--space-3) var(--space-4);
  background: transparent; border: 0;
  font: inherit; font-size: var(--size-small); font-weight: 500;
  color: var(--color-fg-muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all var(--duration-fast);
}
.tab:hover { color: var(--color-fg); }
.tab.is-active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
.tab-panel { display: none; }
.tab-panel.is-active { display: block; }

/* ─── Cards ────────────────────────────────────────────────────────── */
.card {
  display: block;
  padding: var(--space-5);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  text-decoration: none;
  color: inherit;
  transition: all var(--duration-fast);
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--color-accent);
  box-shadow: var(--shadow);
}
.card__icon { font-size: 28px; margin-bottom: var(--space-3); }
.card__title { font-family: var(--font-display); font-size: var(--size-h3); margin: 0 0 var(--space-2); }
.card__desc { font-size: var(--size-small); color: var(--color-fg-muted); margin: 0 0 var(--space-3); max-width: 38ch; }
.card__cta { font-size: var(--size-small); font-weight: 500; color: var(--color-accent); }

/* ─── Métricas ─────────────────────────────────────────────────────── */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-6); margin: var(--space-7) 0; }
.metric { border-top: 2px solid var(--color-fg); padding-top: var(--space-3); }
.metric__val { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; line-height: 1; margin: 0 0 var(--space-2); }
.metric__val span { color: var(--color-accent); }
.metric__label { font-size: var(--size-small); color: var(--color-fg-muted); margin: 0; max-width: 22ch; line-height: 1.4; }

/* ─── Timeline vertical ────────────────────────────────────────────── */
.timeline { list-style: none; padding: 0; margin: var(--space-5) 0; position: relative; }
.timeline::before {
  content: '';
  position: absolute;
  left: 8px; top: 0; bottom: 0;
  width: 2px;
  background: var(--color-border);
}
.timeline__item { position: relative; padding-left: var(--space-7); margin-bottom: var(--space-6); }
.timeline__dot {
  position: absolute;
  left: 0; top: 6px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--color-accent);
  box-shadow: 0 0 0 4px var(--color-bg);
}
.timeline__date { font-family: var(--font-mono); font-size: var(--size-xs); color: var(--color-accent); text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 var(--space-1); }
.timeline__title { font-family: var(--font-display); font-size: 1.0625rem; margin: 0 0 var(--space-1); }
.timeline__desc { font-size: var(--size-small); color: var(--color-fg-muted); margin: 0; line-height: 1.5; }

/* ─── prefers-reduced-motion ───────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  [data-reveal] { opacity: 1; transform: none; }
}

html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-text);
  font-size: var(--size-body);
  line-height: 1.65;
  color: var(--color-fg);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  transition: background var(--duration-fast), color var(--duration-fast);
}

/* Foco visível (a11y) */
:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* Headings editoriais (não-deck) */
h1, h2, h3, h4 {
  font-family: var(--font-display);
  color: var(--color-fg);
  line-height: 1.25;
  letter-spacing: -0.015em;
}
h1 { font-size: var(--size-h1); font-weight: 700; margin: 0 0 var(--space-3); }
h2 {
  font-size: var(--size-h2); font-weight: 700;
  margin: var(--space-10) 0 var(--space-4);
  scroll-margin-top: calc(var(--header-h) + var(--space-4));
  position: relative;
}
h3 {
  font-size: var(--size-h3); font-weight: 600;
  margin: var(--space-7) 0 var(--space-3);
  scroll-margin-top: calc(var(--header-h) + var(--space-4));
}
h4 { font-size: var(--size-h4); font-weight: 600; margin: var(--space-5) 0 var(--space-2); }

p { margin: 0 0 var(--space-4); max-width: 65ch; color: var(--color-fg); }
.lead {
  font-size: var(--size-lead);
  line-height: 1.5;
  color: var(--color-fg-muted);
  margin-bottom: var(--space-7);
  font-weight: 400;
  max-width: 60ch;
}
a { color: var(--color-accent); text-decoration: none; }
a:hover { color: var(--color-accent-hover); text-decoration: underline; text-underline-offset: 3px; }
strong { font-weight: 600; }
code:not(pre code) {
  font-family: var(--font-mono); font-size: 0.875em;
  background: var(--color-bg-sunken);
  padding: 0.12em 0.4em;
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
}
ul, ol { padding-left: var(--space-5); margin: 0 0 var(--space-4); }
li { margin-bottom: var(--space-2); max-width: 65ch; }
li::marker { color: var(--color-fg-subtle); }

/* ─── Callouts ─────────────────────────────────────────────────────── */
.callout {
  display: flex; gap: var(--space-4);
  padding: var(--space-4) var(--space-5);
  margin: var(--space-5) 0;
  border-left: 3px solid;
  border-radius: var(--radius);
}
.callout--info   { background: var(--color-info-bg);   border-color: var(--color-info-border); }
.callout--tip    { background: var(--color-tip-bg);    border-color: var(--color-tip-border); }
.callout--warn   { background: var(--color-warn-bg);   border-color: var(--color-warn-border); }
.callout--danger { background: var(--color-danger-bg); border-color: var(--color-danger-border); }
.callout__icon {
  flex-shrink: 0; width: 22px; height: 22px;
  display: grid; place-items: center;
  border-radius: 50%; font-weight: 700;
  font-size: 0.75rem; color: white;
  margin-top: 2px;
}
.callout--info   .callout__icon { background: var(--color-info-border); }
.callout--tip    .callout__icon { background: var(--color-tip-border); }
.callout--warn   .callout__icon { background: var(--color-warn-border); color: var(--itau-warm-black); }
.callout--danger .callout__icon { background: var(--color-danger-border); }
.callout__content { flex: 1; min-width: 0; }
.callout__title { font-weight: 600; margin: 0 0 var(--space-1); font-size: var(--size-small); }
.callout__content p { margin: 0; font-size: var(--size-small); }

/* ─── Code block ───────────────────────────────────────────────────── */
.code {
  position: relative;
  background: var(--color-bg-sunken);
  border-radius: var(--radius);
  margin: var(--space-4) 0;
  border: 1px solid var(--color-border);
  overflow: hidden;
}
.code__head {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3) var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--color-border);
  background: var(--color-bg-elevated);
}
.code__lang  { font-family: var(--font-mono); font-size: var(--size-xs); color: var(--color-fg-subtle); }
.code__copy {
  padding: 4px 10px; font-size: var(--size-xs);
  background: var(--color-bg); border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); cursor: pointer;
  color: var(--color-fg-muted); font: inherit;
  transition: all var(--duration-fast);
}
.code__copy:hover { color: var(--color-fg); border-color: var(--color-border-strong); }
.code__copy.is-copied { color: var(--color-accent); border-color: var(--color-accent); }
.code pre { padding: var(--space-4); overflow-x: auto; margin: 0; }
.code code { font-family: var(--font-mono); font-size: var(--size-code); line-height: 1.65; color: var(--color-fg); }

/* Highlighting manual mínimo */
.tk-comment { color: var(--color-fg-subtle); font-style: italic; }
.tk-str { color: var(--syntax-string); }
.tk-kw  { color: var(--syntax-keyword); font-weight: 500; }
.tk-fn  { color: var(--syntax-function); }

/* ─── Toggle (<details>) ───────────────────────────────────────────── */
.toggle {
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  margin: var(--space-3) 0;
  overflow: hidden;
  background: var(--color-bg);
  transition: border-color var(--duration-fast);
}
.toggle:hover { border-color: var(--color-border-strong); }
.toggle[open] { background: var(--color-bg-elevated); }
.toggle__summary {
  padding: var(--space-3) var(--space-5);
  cursor: pointer;
  font-weight: 500;
  font-size: var(--size-small);
  list-style: none;
}
.toggle__summary::-webkit-details-marker { display: none; }
.toggle__summary::before {
  content: '▸';
  display: inline-block;
  margin-right: var(--space-3);
  color: var(--color-fg-subtle);
  transition: transform var(--duration-fast);
}
.toggle[open] .toggle__summary::before { transform: rotate(90deg); }
.toggle__body { padding: 0 var(--space-5) var(--space-4); }

/* ─── Theme toggle button ──────────────────────────────────────────── */
.theme-toggle {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--color-fg);
  font-size: 14px;
  transition: all var(--duration-fast);
}
.theme-toggle:hover { background: var(--color-bg-elevated); border-color: var(--color-border-strong); }

/* ─── Reveal on scroll ─────────────────────────────────────────────── */
[data-reveal] {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 600ms var(--ease-out), transform 600ms var(--ease-out);
}
[data-reveal].is-visible { opacity: 1; transform: none; }

/* ─── Tabs ─────────────────────────────────────────────────────────── */
.tabs { display: flex; gap: var(--space-1); border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-5); }
.tab {
  padding: var(--space-3) var(--space-4);
  background: transparent; border: 0;
  font: inherit; font-size: var(--size-small); font-weight: 500;
  color: var(--color-fg-muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all var(--duration-fast);
}
.tab:hover { color: var(--color-fg); }
.tab.is-active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
.tab-panel { display: none; }
.tab-panel.is-active { display: block; }

/* ─── Cards ────────────────────────────────────────────────────────── */
.card {
  display: block;
  padding: var(--space-5);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  text-decoration: none;
  color: inherit;
  transition: all var(--duration-fast);
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--color-accent);
  box-shadow: var(--shadow);
}
.card__icon { font-size: 28px; margin-bottom: var(--space-3); }
.card__title { font-family: var(--font-display); font-size: var(--size-h3); margin: 0 0 var(--space-2); }
.card__desc { font-size: var(--size-small); color: var(--color-fg-muted); margin: 0 0 var(--space-3); max-width: 38ch; }
.card__cta { font-size: var(--size-small); font-weight: 500; color: var(--color-accent); }

/* ─── Métricas ─────────────────────────────────────────────────────── */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-6); margin: var(--space-7) 0; }
.metric { border-top: 2px solid var(--color-fg); padding-top: var(--space-3); }
.metric__val { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; line-height: 1; margin: 0 0 var(--space-2); }
.metric__val span { color: var(--color-accent); }
.metric__label { font-size: var(--size-small); color: var(--color-fg-muted); margin: 0; max-width: 22ch; line-height: 1.4; }

/* ─── Timeline vertical ────────────────────────────────────────────── */
.timeline { list-style: none; padding: 0; margin: var(--space-5) 0; position: relative; }
.timeline::before {
  content: '';
  position: absolute;
  left: 8px; top: 0; bottom: 0;
  width: 2px;
  background: var(--color-border);
}
.timeline__item { position: relative; padding-left: var(--space-7); margin-bottom: var(--space-6); }
.timeline__dot {
  position: absolute;
  left: 0; top: 6px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--color-accent);
  box-shadow: 0 0 0 4px var(--color-bg);
}
.timeline__date { font-family: var(--font-mono); font-size: var(--size-xs); color: var(--color-accent); text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 var(--space-1); }
.timeline__title { font-family: var(--font-display); font-size: 1.0625rem; margin: 0 0 var(--space-1); }
.timeline__desc { font-size: var(--size-small); color: var(--color-fg-muted); margin: 0; line-height: 1.5; }

/* ─── prefers-reduced-motion ───────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  [data-reveal] { opacity: 1; transform: none; }
}


    /* Deck: viewport-cheio, sem scroll do body */
    html, body { height: 100%; overflow: hidden; }
    body { overscroll-behavior: none; }

    .deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center;
      padding: 8vh 10vw;
      opacity: 0;
      pointer-events: none;
      transform: translateX(40px);
      transition: opacity var(--duration-fade) var(--ease-out),
                  transform var(--duration-slide) var(--ease-in-out);
    }
    .slide.is-prev { transform: translateX(-40px); }
    .slide.is-active { opacity: 1; transform: translateX(0); pointer-events: auto; }

    /* Stagger entrada */
    .slide [data-anim] { opacity: 0; transform: translateY(24px); transition: opacity 700ms var(--ease-out), transform 700ms var(--ease-out); }
    .slide.is-active [data-anim] { opacity: 1; transform: translateY(0); transition-delay: calc(var(--anim-i, 0) * 80ms + 200ms); }

    /* Hero typewriter-ish */
    .slide.is-active [data-anim="hero"] { animation: heroIn 900ms var(--ease-out) 100ms both; }
    @keyframes heroIn {
      from { opacity: 0; filter: blur(16px); transform: translateY(20px); }
      to   { opacity: 1; filter: blur(0);    transform: translateY(0); }
    }

    /* Fragments */
    .slide [data-fragment] { opacity: 0; transform: translateY(12px); transition: opacity 500ms var(--ease-out), transform 500ms var(--ease-out); }
    .slide [data-fragment].is-visible { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      .slide, .slide [data-anim], .slide [data-fragment] {
        transition: none !important; animation: none !important;
        opacity: 1; transform: none !important; filter: none !important;
      }
    }

    /* Tipografia DECK — única exceção: clamp() gigante OK */
    .kicker { display: inline-flex; align-items: center; gap: 12px; font-size: 0.875rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-fg-muted); margin-bottom: 28px; }
    .kicker__dot { width: 4px; height: 4px; border-radius: 50%; background: var(--color-fg-subtle); }
    .kicker--accent { color: var(--color-accent); }

    .title-xl { font-family: var(--font-display); font-size: clamp(2.75rem, 6.5vw, 6rem); line-height: 1.02; font-weight: 800; letter-spacing: -0.035em; margin: 0 0 32px; max-width: 18ch; color: var(--color-fg); }
    .title-xl em { color: var(--color-accent); font-style: normal; font-weight: 800; }
    .title-lg { font-family: var(--font-display); font-size: clamp(2rem, 4.5vw, 3.5rem); line-height: 1.1; font-weight: 700; letter-spacing: -0.025em; margin: 0 0 24px; max-width: 22ch; color: var(--color-fg); }
    .title-md { font-family: var(--font-display); font-size: clamp(1.5rem, 2.5vw, 2.25rem); line-height: 1.15; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 20px; color: var(--color-fg); }
    .lead { font-size: clamp(1.125rem, 1.6vw, 1.5rem); line-height: 1.45; color: var(--color-fg-muted); max-width: 50ch; margin: 0 0 32px; font-weight: 400; }

    .big-num { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .big-num__val { font-family: var(--font-display); font-size: clamp(5rem, 16vw, 14rem); line-height: 0.9; font-weight: 800; letter-spacing: -0.05em; color: var(--color-fg); margin: 0; }
    .big-num__val span { color: var(--color-accent); }
    .big-num__label { font-size: clamp(1.125rem, 1.6vw, 1.5rem); color: var(--color-fg-muted); margin: 24px 0 0; max-width: 32ch; text-align: center; }

    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5vw; margin: 48px 0 0; }
    .metric { border-top: 3px solid var(--color-fg); padding-top: 24px; }
    .metric__val { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 12px; }
    .metric__val span { color: var(--color-accent); }
    .metric__label { font-size: 1rem; color: var(--color-fg-muted); margin: 0; max-width: 22ch; line-height: 1.4; }

    .list { list-style: none; padding: 0; margin: 32px 0 0; display: flex; flex-direction: column; gap: 24px; max-width: 36ch; }
    .list__item { display: flex; gap: 24px; font-size: clamp(1.125rem, 1.6vw, 1.5rem); line-height: 1.4; color: var(--color-fg); max-width: 38ch; }
    .list__num { flex-shrink: 0; width: 32px; height: 32px; display: grid; place-items: center; border-radius: 50%; background: var(--color-accent); color: white; font-family: var(--font-mono); font-size: 0.875rem; font-weight: 600; margin-top: 6px; }

    .meta { display: flex; gap: 32px; margin-top: 64px; font-size: 0.875rem; color: var(--color-fg-subtle); letter-spacing: 0.02em; }
    .meta strong { color: var(--color-fg); font-weight: 600; }

    /* HUD */
    .hud { position: fixed; bottom: 16px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 16px; z-index: 50; pointer-events: none; }
    .hud > * { pointer-events: auto; }
    .hud__btn, .hud__fs { width: 36px; height: 36px; display: grid; place-items: center; background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: 999px; cursor: pointer; color: var(--color-fg); transition: all var(--duration-fast); }
    .hud__btn:hover, .hud__fs:hover { border-color: var(--color-border-strong); }
    .hud__counter { font-family: var(--font-mono); font-size: 0.875rem; color: var(--color-fg-muted); }

    @media print {
      @page { size: A4 landscape; margin: 0; }
      .hud { display: none; }
      .deck { width: auto; height: auto; overflow: visible; }
      .slide { position: relative; inset: auto; width: 100vw; height: 100vh; page-break-after: always; opacity: 1 !important; transform: none !important; }
      .slide [data-fragment], .slide [data-anim] { opacity: 1 !important; transform: none !important; filter: none !important; }
    }
  </style>
</head>
<body>
  <div class="deck">
    <section class="slide is-active" data-slide="1">
      <p class="kicker kicker--accent" data-anim style="--anim-i: 0"><span class="kicker__dot"></span>CAPÍTULO 01</p>
      <h1 class="title-xl" data-anim="hero">Título <em>chave</em> do deck</h1>
      <p class="lead" data-anim style="--anim-i: 2">Subtítulo de uma frase posicionando o pitch.</p>
      <div class="meta" data-anim style="--anim-i: 3">
        <span><strong>Apresentador</strong><br>Data</span>
      </div>
    </section>

    <section class="slide" data-slide="2">
      <h2 class="title-md" data-anim>Resultados</h2>
      <ul class="list">
        <li class="list__item" data-fragment><span class="list__num">1</span><div><strong>Métrica 1</strong></div></li>
        <li class="list__item" data-fragment><span class="list__num">2</span><div><strong>Métrica 2</strong></div></li>
        <li class="list__item" data-fragment><span class="list__num">3</span><div><strong>Métrica 3</strong></div></li>
      </ul>
    </section>

    <section class="slide" data-slide="3">
      <div class="big-num">
        <p class="big-num__val" data-anim>+<span>34%</span></p>
        <p class="big-num__label" data-anim style="--anim-i: 1">Descrição da métrica.</p>
      </div>
    </section>
  </div>

  <nav class="hud" aria-label="Controles do deck">
    <button class="hud__btn hud__prev" type="button" aria-label="Slide anterior">◀</button>
    <span class="hud__counter"><span id="cur">1</span> / <span id="tot">3</span></span>
    <button class="hud__btn hud__next" type="button" aria-label="Próximo slide">▶</button>
    <button class="hud__fs" type="button" aria-label="Fullscreen">⛶</button>
  </nav>

  <script>
    const slides = [...document.querySelectorAll('.slide')];
    const fragmentsByIdx = slides.map(s => [...s.querySelectorAll('[data-fragment]')]);
    const fragShownByIdx = slides.map(() => 0);
    let idx = 0;

    function goto(n) {
      n = Math.max(0, Math.min(slides.length - 1, n));
      slides.forEach((s, i) => {
        s.classList.toggle('is-active', i === n);
        s.classList.toggle('is-prev', i < n);
      });
      idx = n;
      document.getElementById('cur').textContent = n + 1;
      document.getElementById('tot').textContent = slides.length;
      history.replaceState(null, '', '#s' + (n + 1));
    }

    function nextFragment() {
      const frags = fragmentsByIdx[idx];
      if (fragShownByIdx[idx] < frags.length) {
        frags[fragShownByIdx[idx]].classList.add('is-visible');
        fragShownByIdx[idx]++;
        return true;
      }
      return false;
    }

    function next() { if (!nextFragment()) goto(idx + 1); }
    function prev() { goto(idx - 1); }

    addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
      else if (e.key === 'Home') goto(0);
      else if (e.key === 'End') goto(slides.length - 1);
      else if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();
      else if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
    });

    document.querySelector('.hud__prev').addEventListener('click', prev);
    document.querySelector('.hud__next').addEventListener('click', next);
    document.querySelector('.hud__fs').addEventListener('click', () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen?.();
    });

    document.querySelector('.theme-toggle')?.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const nx = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', nx);
      try { localStorage.setItem('theme', nx); } catch {}
    });

    const fromHash = parseInt((location.hash.match(/^#s(\d+)$/) || [])[1], 10);
    goto(fromHash ? fromHash - 1 : 0);
  </script>
